apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-app-b-sa
  namespace: sre-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: sre-demo
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-app-b-pod-reader
  namespace: sre-demo
subjects:
- kind: ServiceAccount
  name: web-app-b-sa
  namespace: sre-demo
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
