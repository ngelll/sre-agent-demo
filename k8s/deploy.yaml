apiVersion: v1
kind: Namespace
metadata:
  name: sre-demo
---
# Note: secret 'appinsights' must be created out-of-band with real connection string:
#   kubectl -n sre-demo create secret generic appinsights --from-literal=APPLICATIONINSIGHTS_CONNECTION_STRING="$APPI_CS"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-a
  namespace: sre-demo
  labels:
    app: web-app-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app-a
  template:
    metadata:
      labels:
        app: web-app-a
    spec:
      containers:
      - name: web-app-a
        image: ACR_LOGIN_SERVER/web-app-a:v1
        ports:
        - containerPort: 8080
        env:
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: appinsights
              key: APPLICATIONINSIGHTS_CONNECTION_STRING
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-a
  namespace: sre-demo
spec:
  selector:
    app: web-app-a
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-b
  namespace: sre-demo
  labels:
    app: web-app-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app-b
  template:
    metadata:
      labels:
        app: web-app-b
    spec:
      containers:
      - name: web-app-b
        image: ACR_LOGIN_SERVER/web-app-b:v1
        ports:
        - containerPort: 8080
        env:
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: appinsights
              key: APPLICATIONINSIGHTS_CONNECTION_STRING
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-b
  namespace: sre-demo
spec:
  selector:
    app: web-app-b
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-b-hpa
  namespace: sre-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app-b
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-demo-ingress
  namespace: sre-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /a(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: web-app-a
            port:
              number: 80
      - path: /b(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: web-app-b
            port:
              number: 80
